name: Trigger auto deployment for signals-backend

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/signals-backend-AutoDeployTrigger-ae15c39c-2584-4051-b978-edd8bed6db00.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.SIGNALSBACKEND_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.SIGNALSBACKEND_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.SIGNALSBACKEND_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: signalsacr0533.azurecr.io
          registryUsername: ${{ secrets.SIGNALSBACKEND_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.SIGNALSBACKEND_REGISTRY_PASSWORD }}
          containerAppName: signals-backend
          resourceGroup: signals-rg
          imageToBuild: signalsacr0533.azurecr.io/signals-backend:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


