name: Trigger auto deployment for signals-frontend

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/signals-frontend-AutoDeployTrigger-675c17b9-6b3e-41bc-a435-695ee64106f7.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.SIGNALSFRONTEND_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.SIGNALSFRONTEND_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.SIGNALSFRONTEND_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          dockerfilePath: frontend/Dockerfile
          registryUrl: signalsacr0533.azurecr.io
          registryUsername: ${{ secrets.SIGNALSFRONTEND_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.SIGNALSFRONTEND_REGISTRY_PASSWORD }}
          containerAppName: signals-frontend
          resourceGroup: signals-rg
          imageToBuild: signalsacr0533.azurecr.io/signals-frontend:${{ github.sha }}
          buildArguments: |
            NEXT_PUBLIC_API_URL=https://signals-backend.azurecontainerapps.io


